# /etc/nginx/sites-available/sasha
# Sasha Brain Bridge — reverse proxy with WSS termination.
# Replace 'your.domain.example' with your actual domain before enabling.
#
# Enable:  ln -s /etc/nginx/sites-available/sasha /etc/nginx/sites-enabled/sasha
# TLS:     certbot --nginx -d your.domain.example

upstream sasha_brain {
    server 127.0.0.1:8765;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.domain.example;

    # Certbot will insert/manage the following ssl_* lines:
    # ssl_certificate     /etc/letsencrypt/live/your.domain.example/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your.domain.example/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    # Strip query strings from logs so auth tokens are not logged.
    log_format sasha_safe '$remote_addr - [$time_local] "$request_method $uri $server_protocol" $status $body_bytes_sent';
    access_log /var/log/nginx/sasha.log sasha_safe;

    # WebSocket endpoint — persistent connection, long timeouts.
    location /ws/ {
        proxy_pass         http://sasha_brain;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # REST endpoints (/health, /ingest/text/*)
    location / {
        proxy_pass        http://sasha_brain;
        proxy_set_header  Host       $host;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
    }
}
